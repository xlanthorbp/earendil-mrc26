# test_params.yaml - Earendil Bot Test ve Görev Düğümleri Parametre Konfigürasyonu
# MRC 2026 Otonom Görev Mimarisi (Raspberry Pi 5 + Arduino + Tekli GPS + Manyetometre + Pi Kamera ArUco)

# ---------------------------------------------------------
# Magnetometer Açı Dönüş Test Düğümü (heading_test)
# ---------------------------------------------------------
heading_test:
  ros__parameters:
    target_heading: 0.0              # Hedef mutlak pusula açısı [derece] (0.0 - 360.0)
    heading_tolerance_deg: 7.0       # Açısal tolerans [derece]
    turn_speed: 0.5                  # Maksimum açısal dönüş hızı [rad/s]
    kp_angular: 2.0                  # Dönüş hızı P katsayısı
    invert_turn: false               # Dönüş yönünü tersleme bayrağı
    dry_run: false                   # Simülasyon modu (Motor hızları gönderilmez)

# ---------------------------------------------------------
# Çoklu/Tekli GPS Test Düğümü (gps_nav_test)
# ---------------------------------------------------------
gps_nav_test:
  ros__parameters:
    target_lat: 39.9017797           # 1. Hedef GPS enlemi (Latitude)
    target_lon: 32.7704813           # 1. Hedef GPS boylamı (Longitude)
    target2_lat: 0.0                 # 2. Hedef GPS enlemi (Opsiyonel, 0.0 ise atlanır)
    target2_lon: 0.0                 # 2. Hedef GPS boylamı (Opsiyonel, 0.0 ise atlanır)
    heading_tolerance_deg: 7.0       # Yönelme açı toleransı [derece]
    arrival_radius: 2.0              # Hedefe varış yarıçapı [metre] (2 Metre)
    max_linear_x: 0.5                # Maksimum ileri hız [m/s]
    max_angular_z: 1.0               # Maksimum dönüş hızı [rad/s]
    kp_angular: 2.5                  # Yönelme P katsayısı
    kp_lane: 1.5                     # Şerit koruma / koridor takip P katsayısı

# ---------------------------------------------------------
# Ana Otonom Navigasyon Düğümü (gps_nav_main)
# 10 Hedef + Görsel ArUco Override + 360° Tarama
# ---------------------------------------------------------
gps_nav_main:
  ros__parameters:
    heading_tolerance_deg: 7.0       # Yönelme açı toleransı [derece]
    gps_arrival_radius: 2.0          # GPS Hedefine varış yarıçapı [metre] (2 Metre)
    aruco_arrival_radius: 0.5        # ArUco etiketine yaklaşma yarıçapı [metre] (50 cm)
    max_linear_x: 0.5                # İleri maksimum hız [m/s]
    max_angular_z: 1.0               # Dönüş maksimum hızı [rad/s]
    kp_angular: 2.5                  # Yönelme P kazancı
    kp_lane: 1.5                     # İlerleme şerit takip P kazancı
    kp_aruco_steer: 0.05             # Görsel ArUco hizalama P kazancı
    sensing_wait_time: 5.0           # Hedefte Sarı LED algılama bekleme süresi [saniye]

    # 10 GPS Hedef Parametresi (Değeri 0.0 olan hedefler otomatik atlanır)
    target1_lat: 39.815910 
    target1_lon: 30.528666
    target2_lat: 39.815850
    target2_lon: 30.528616
    target3_lat: 0.0
    target3_lon: 0.0
    target4_lat: 0.0
    target4_lon: 0.0
    target5_lat: 0.0
    target5_lon: 0.0
    target6_lat: 0.0
    target6_lon: 0.0
    target7_lat: 0.0
    target7_lon: 0.0
    target8_lat: 0.0
    target8_lon: 0.0
    target9_lat: 0.0
    target9_lon: 0.0
    target10_lat: 0.0
    target10_lon: 0.0

# ---------------------------------------------------------
# Komut Kaydı ve Rota Tersleme ile Üsse Dönüş (path_recorder)
# ---------------------------------------------------------
path_recorder:
  ros__parameters:
    heading_tolerance_deg: 7.5       # 180° dönüş hassasiyeti [derece]
    turn_initial_settle_s: 0.4       # 180° dönüş öncesi sönümlenme süresi [saniye]
    turn_required_samples: 3         # Tolerans içi ardışık doğrulama örnek sayısı
    post_turn_pause_s: 0.5           # Dönüş sonrası ters rotaya geçmeden önceki duraklama süresi [saniye]
    route_log_path: "~/.ros/earendil_bot/last_route.json" # Rota JSON kayıt adresi
